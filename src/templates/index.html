<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container py-5">

        <div class="text-center mb-4">
            <img class="logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
        </div>

        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h1 class="mb-4">Client info</h1>

                <p class="fs-4">
                    <strong>Your public ip:</strong> {{ ip_cliente }}
                </p>

                <p class="fs-4">
                    <strong>Date and time:</strong> {{ fecha_hora }}
                </p>

                <hr>

                <p class="text-muted">
                    Page generated with Flask + Bootstrap + my
                </p>
            </div>
        </div>

    </div>
</body>
</html>
